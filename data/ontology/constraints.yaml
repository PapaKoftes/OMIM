# Constraint Definitions — Manufacturing Ontology
# Version: v0.1.0
# Source: 04_ONTOLOGY/Constraint_Taxonomy.md
# 10 constraint types with default values for panel CNC

version: "v0.1.0"
domain: "panel_manufacturing_2.5d"

constraints:
  - id: MIN_EDGE_CLEARANCE
    name: "Minimum Edge Clearance"
    description: "Min distance from feature centroid to panel edge"
    unit: mm
    source: "MFG-001; shop convention"
    default_value: 8.0

  - id: MIN_FEATURE_SPACING
    name: "Minimum Feature Spacing"
    description: "Min edge-to-edge distance between adjacent features"
    unit: mm
    source: "MFG-002; material strength"
    default_value: 3.0

  - id: MIN_DRILL_DIAMETER
    name: "Minimum Drill Diameter"
    description: "Min manufacturable hole diameter"
    unit: mm
    source: "Tooling limit"
    default_value: 3.0

  - id: MAX_DRILL_DIAMETER
    name: "Maximum Drill Diameter"
    description: "Max for drilling (route instead)"
    unit: mm
    source: "Process limit"
    default_value: 40.0

  - id: CORNER_RADIUS
    name: "Minimum Corner Radius"
    description: "Min internal corner radius (= tool_radius)"
    unit: mm
    source: "CNC routing geometry"
    default_value: 3.0

  - id: MIN_POCKET_WIDTH
    name: "Minimum Pocket Width"
    description: "Min milled pocket width (= 1.2 x tool_diameter)"
    unit: mm
    source: "MFG-004; routing clearance"
    default_value: 7.2

  - id: MAX_BLIND_DEPTH
    name: "Maximum Blind Depth"
    description: "Max blind feature depth as ratio of thickness"
    unit: ratio
    source: "MFG-007; structural floor"
    default_value: 0.75

  - id: PANEL_THICKNESS
    name: "Panel Thickness"
    description: "Nominal panel thickness"
    unit: mm
    source: "Material spec (EN 309)"
    default_value: 18.0

  - id: TOOL_DIAMETER
    name: "Tool Diameter"
    description: "Default routing tool diameter"
    unit: mm
    source: "Tooling"
    default_value: 6.0

  - id: DRILL_DIAMETER
    name: "Drill Diameter"
    description: "Specific drill bit diameter"
    unit: mm
    source: "Tooling"
    default_value: 5.0
