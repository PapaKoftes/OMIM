services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: omim-backend:0.1.0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - OMIM_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      # Build context is the frontend dir; the Dockerfile lives at the repo root.
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    image: omim-frontend:0.1.0
    ports:
      - "5173:80"
    depends_on:
      - backend
